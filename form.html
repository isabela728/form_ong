<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Adoção</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="assets/user-campaign-about-photo_uz0mwhzdwxyt7xkxfwjq_400x400-20210809_22400843.jpeg" alt="logo" id="logo" onclick="window.location.href='index.html'">

        <button id="menu-button" aria-label="Abrir menu" aria-expanded="false" aria-controls="header-menu">
            <img src="assets/cardapio.svg" alt="menu" id="menu">
        </button>
        <nav id="header-menu" class="menu-panel" aria-hidden="true">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="ajude.html">Ajude</a></li>
                <li><a href="form.html" class="selected">Formulário de Adoção</a></li>
                <li><a href="temporario.html">Lar Temporário</a></li>
                <li><a href="oquefazer.html">O Que Fazer</a></li>
            </ul>
        </nav>
    </header>

        <form id="form">
            <div class="form_label">
                <label for="nome">Nome completo:</label>
                <input type="text" id="nome" placeholder="nome">
            </div>

            <div class="form_label">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="email">
            </div>

            <div class="form_label">
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" placeholder="telefone">
            </div>

            <div class="form_label">
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" placeholder="CPF">
            </div>

            <div class="form_label">
                <label for="idade">Idade:</label>
                <input type="number" id="idade" placeholder="idade">
            </div>

            <div class="form_label">
                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" placeholder="Cidade">
            </div>

            <div class="form_label">
                <p>Tipo de moradia:</p>
                <input type="radio" id="casa" name="moradia">
                <label for="casa">Casa</label>
                <input type="radio" id="ap" name="moradia">
                <label for="ap">Apartamento</label>
            </div>

            <div class="form_label">
                <p>Possui quintal?</p>
                <input type="radio" id="sim" name="quintal">
                <label for="sim">Sim</label>
                <input type="radio" id="nao" name="quintal">
                <label for="nao">Não</label>
            </div>

            <div class="form_label">
                <p>Já teve pet antes?</p>
                <input type="radio" id="sim" name="pet">
                <label for="sim">Sim</label>

                <input type="radio" id="nao" name="pet">
                <label for="nao">Não</label>
            </div>

            <div class="form_label">
                <label for="horas">Quantas horas o animal ficará sozinho por dia:</label>
                <input type="time" id="horas">
            </div>

            <div class="form_label">
                <label for="message">Por que deseja adotar um animal?</label>
                <textarea name="message" id="message"></textarea>
            </div>

            <div class="form_label">
                <input type="checkbox" id="termo">
                <label for="termo"> Aceito o termo de responsabilidade</label>
            </div>
        </form>
    
</body>
<script src="script.js"></script>
</html>
