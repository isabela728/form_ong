<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Adoção</title>
</head>
<body>

        <form id="form">

            <label for="nome">Nome completo:</label>
            <input type="text" id="nome" placeholder="nome">

            <label for="email">Email:</label>
            <input type="email" id="emal" placeholder="email">

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" placeholder="telefone">

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" placeholder="CPF">
            
            <label for="idade">Idade:</label>
            <input type="number" id="idade" placeholder="idade">
            
            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" placeholder="Cidade">

            <p>Tipo de moradia:</p>
            <input type="radio" id="casa" name="moradia">
            <label for="casa">Casa</label>
            <input type="radio" id="ap" name="moradia">
            <label for="ap">Apartamento</label><br>

            <p>Possui quintal:</p>
            <input type="radio" id="sim" name="quintal">
            <label for="sim">Sim</label>
            <input type="radio" id="nao" name="quintal">
            <label for="nao">Não</label><br>
            
        </form>
    
</body>
</html>
